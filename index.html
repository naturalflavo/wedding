<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>상연 ♥ 예은 결혼합니다</title>
<meta property="og:title" content="상연 ♥ 예은 결혼합니다" />
<meta property="og:description" content="2026년 10월 17일 토요일 오전 11시, 더화이트베일 W홀" />
<meta property="og:image" content="https://naturalflavo.github.io/wedding/photos/main.jpg" />
<meta property="og:url" content="https://naturalflavo.github.io/wedding/" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Serif KR", serif;
    color: #35434f;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    position: relative; min-height: 100svh;
    display: flex; flex-direction: column; justify-content: space-between; align-items: center;
    overflow: hidden;
  }
  .bg {
    position: absolute; inset: 0;
    background: url("photos/main.jpg") center / cover no-repeat;
  }
  .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(30,60,90,.18) 0%, rgba(30,60,90,0) 22%, rgba(247,250,252,0) 68%, rgba(247,250,252,.5) 82%, rgba(247,250,252,.95) 94%, #f7fafc 100%);
  }
  .content-top {
    position: relative; z-index: 1; text-align: center;
    padding-top: calc(52px + env(safe-area-inset-top));
    color: #fff;
    text-shadow: 0 1px 10px rgba(35, 65, 95, .4);
  }
  .date { font-size: 12px; letter-spacing: 5px; margin-bottom: 12px; opacity: .92; }
  .names { font-size: 27px; font-weight: 400; letter-spacing: 2px; }
  .names .amp { font-size: 18px; margin: 0 12px; font-style: italic; opacity: .85; }
  .place { margin-top: 10px; font-size: 13.5px; opacity: .92; }
  .content-bottom {
    position: relative; z-index: 1; width: 100%; max-width: 430px;
    text-align: center;
    padding: 0 28px calc(40px + env(safe-area-inset-bottom));
  }
  .pick { font-size: 11px; letter-spacing: 4px; color: #5f87a8; text-transform: uppercase; margin-bottom: 14px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cards a {
    display: block; padding: 18px 10px 16px; border-radius: 14px; text-decoration: none;
    background: rgba(255,255,255,.94); border: 1px solid #dde7ee; color: #35434f;
    box-shadow: 0 8px 24px rgba(80, 110, 140, .12);
  }
  .cards .t { font-size: 15.5px; }
  .cards .s { display: block; margin-top: 6px; font-size: 11.5px; color: #83919c; line-height: 1.5; }
  .cards a.night { background: rgba(15, 25, 42, .92); border-color: #2b3d55; color: #edf2f9; }
  .cards a.night .s { color: #9db0c5; }
</style>
</head>
<body>
<div class="stage">
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="content-top">
    <p class="date">2026. 10. 17. 토</p>
    <p class="names">우상연<span class="amp">&amp;</span>강예은</p>
    <p class="place">더화이트베일 4층 W홀 · 오전 11시</p>
  </div>
  <div class="content-bottom">
    <p class="pick">Choose Your Invitation</p>
    <div class="cards">
      <a class="night" href="star/">
        <span class="t">✦ 별빛 편</span>
        <span class="s">처음 만난 그날<br />출발한 빛</span>
      </a>
      <a href="sunsin/">
        <span class="t">이순신 편</span>
        <span class="s">같이 살기로<br />했습니다</span>
      </a>
    </div>
  </div>
</div>
</body>
</html>
